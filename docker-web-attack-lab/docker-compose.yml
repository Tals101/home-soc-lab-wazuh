version: "3.8"

services:
  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa
    ports:
      - "8080:80"
    environment:
      - MYSQL_ROOT_PASSWORD=password
    restart: always

  kali:
    image: kalilinux/kali-rolling
    container_name: kali
    tty: true
    stdin_open: true
    command: /bin/bash

  juice:
    image: bkimminich/juice-shop
    container_name: juice_shop
    ports:
      - "3000:3000"
    restart: always